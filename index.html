<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CVM Scraper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      color: #333;
      padding: 2rem;
      max-width: 640px;
      margin: 0 auto;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
    label { display: block; font-weight: 600; margin-bottom: 0.3rem; font-size: 0.9rem; }
    input[type="text"] {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }
    .field-hint { color: #888; font-size: 0.8rem; margin-top: -0.8rem; margin-bottom: 1rem; }
    .fundos-grid { margin-bottom: 1rem; }
    .fundo-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid #eee;
    }
    .fundo-item label { margin: 0; font-weight: 400; cursor: pointer; }
    .fundo-cnpj { color: #888; font-size: 0.85rem; font-family: monospace; }
    .actions { margin-top: 1.5rem; }
    button {
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 0.6rem 1.5rem;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    #status {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 6px;
      display: none;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    #status.info { display: block; background: #eff6ff; border: 1px solid #bfdbfe; }
    #status.success { display: block; background: #f0fdf4; border: 1px solid #bbf7d0; }
    #status.error { display: block; background: #fef2f2; border: 1px solid #fecaca; }
    a { color: #2563eb; }
    .select-all { font-size: 0.85rem; color: #2563eb; cursor: pointer; margin-left: 0.5rem; }
  </style>
</head>
<body>

<h1>CVM Scraper</h1>
<p class="subtitle">Dispare a extração de carteiras via GitHub Actions</p>

<div>
  <label for="competencia">Competência (MM/AAAA)</label>
  <input type="text" id="competencia" placeholder="Ex: 02/2026 (vazio = mais recente)" maxlength="7">
  <p class="field-hint">Deixe vazio para usar a competência mais recente disponível.</p>
</div>

<div>
  <label>Fundos <span class="select-all" id="toggleAll">[selecionar todos]</span></label>
  <div class="fundos-grid" id="fundosGrid"></div>
</div>

<div class="actions">
  <button id="btnRun" onclick="executar()">Executar</button>
</div>

<div id="status"></div>

<script>
// URL do Cloudflare Worker — atualizar após deploy
const API_URL = 'https://cvm-scraper-api.joaoaravechia.workers.dev';

const OWNER = 'joaoaravechia';
const REPO = 'cvm-scraper';

const FUNDOS = [
  { cnpj: '08915927000163', cnpjFmt: '08.915.927/0001-63', nome: 'Fundo 08915927', pk: '289707' },
  { cnpj: '06175696000173', cnpjFmt: '06.175.696/0001-73', nome: 'Fundo 06175696', pk: '280545' },
];

// --- Init ---
document.addEventListener('DOMContentLoaded', () => {
  const grid = document.getElementById('fundosGrid');
  FUNDOS.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'fundo-item';
    div.innerHTML = `
      <input type="checkbox" id="fundo_${i}" value="${f.cnpj}" checked>
      <label for="fundo_${i}">${f.nome} <span class="fundo-cnpj">${f.cnpjFmt}</span></label>
    `;
    grid.appendChild(div);
  });

  document.getElementById('toggleAll').addEventListener('click', () => {
    const cbs = document.querySelectorAll('#fundosGrid input[type=checkbox]');
    const allChecked = [...cbs].every(c => c.checked);
    cbs.forEach(c => c.checked = !allChecked);
    document.getElementById('toggleAll').textContent = allChecked ? '[selecionar todos]' : '[desmarcar todos]';
  });
});

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.innerHTML = msg;
  el.className = type;
}

async function apiFetch(path, options = {}) {
  return fetch(`${API_URL}${path}`, {
    headers: { 'Content-Type': 'application/json' },
    ...options,
  });
}

async function executar() {
  const competencia = document.getElementById('competencia').value.trim();
  const cbs = document.querySelectorAll('#fundosGrid input[type=checkbox]:checked');
  if (cbs.length === 0) { setStatus('Selecione ao menos um fundo.', 'error'); return; }

  const cnpjs = [...cbs].map(c => c.value).join(',');
  const btn = document.getElementById('btnRun');
  btn.disabled = true;

  setStatus('Disparando workflow...', 'info');

  try {
    // Dispatch via Worker
    const dispatchRes = await apiFetch('/dispatch', {
      method: 'POST',
      body: JSON.stringify({ competencia, cnpjs }),
    });

    if (!dispatchRes.ok) {
      const err = await dispatchRes.json();
      throw new Error(`Dispatch falhou: ${err.error || dispatchRes.status}`);
    }

    setStatus('Workflow disparado! Aguardando início...', 'info');

    // Poll for run
    await new Promise(r => setTimeout(r, 3000));
    let runId = null;

    for (let i = 0; i < 20; i++) {
      const runsRes = await apiFetch('/runs');
      const data = await runsRes.json();
      const recent = data.runs?.[0];
      if (recent && (recent.status === 'queued' || recent.status === 'in_progress')) {
        runId = recent.id;
        break;
      }
      await new Promise(r => setTimeout(r, 3000));
    }

    if (!runId) {
      setStatus('Workflow disparado mas não foi possível encontrar a run. <a href="https://github.com/' + OWNER + '/' + REPO + '/actions" target="_blank">Ver Actions</a>', 'info');
      btn.disabled = false;
      return;
    }

    // Poll for completion
    const runUrl = `https://github.com/${OWNER}/${REPO}/actions/runs/${runId}`;
    setStatus(`Workflow em execução... <a href="${runUrl}" target="_blank">Acompanhar no GitHub</a>`, 'info');

    for (let i = 0; i < 60; i++) {
      await new Promise(r => setTimeout(r, 5000));
      const runRes = await apiFetch(`/runs/${runId}`);
      const run = await runRes.json();

      if (run.status === 'completed') {
        if (run.conclusion === 'success') {
          const artRes = await apiFetch(`/artifacts/${runId}`);
          const artData = await artRes.json();
          const artifact = artData.artifacts?.[0];

          let downloadHtml = '';
          if (artifact) {
            downloadHtml = `<br><a href="${artifact.download_url}" target="_blank">Baixar artifacts no GitHub</a>`;
          }
          setStatus(`Concluído com sucesso!${downloadHtml}`, 'success');
        } else {
          setStatus(`Workflow finalizado: <strong>${run.conclusion}</strong>. <a href="${runUrl}" target="_blank">Ver detalhes</a>`, 'error');
        }
        btn.disabled = false;
        return;
      }
    }

    setStatus(`Timeout aguardando conclusão. <a href="${runUrl}" target="_blank">Acompanhar no GitHub</a>`, 'info');
  } catch (e) {
    setStatus(`Erro: ${e.message}`, 'error');
  }

  btn.disabled = false;
}
</script>

</body>
</html>
