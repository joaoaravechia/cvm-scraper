name: CVM Scraper Mensal

on:
  schedule:
    - cron: '0 10 5 * *'  # Dia 5 de cada mês às 10h UTC
  workflow_dispatch:       # Trigger manual

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python cvm_scraper.py

      - name: Upload Excels as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: patrimonio_liquido_cvm
          path: patrimonio_liquido_cvm_*.xlsx

      - name: Commit and push Excels
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add patrimonio_liquido_cvm_*.xlsx
          git diff --cached --quiet || git commit -m "Atualizar planilhas CVM [$(date -u '+%Y-%m-%d')]"
          git push
