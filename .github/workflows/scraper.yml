name: CVM Scraper Mensal

on:
  schedule:
    - cron: '0 10 5 * *'  # Dia 5 de cada mês às 10h UTC
  workflow_dispatch:
    inputs:
      competencia:
        description: 'Competência (MM/AAAA). Vazio = mais recente.'
        required: false
        default: ''
        type: string
      cnpjs:
        description: 'CNPJs separados por vírgula (só dígitos). Vazio = todos.'
        required: false
        default: ''
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          INPUT_COMPETENCIA: ${{ github.event.inputs.competencia || '' }}
          INPUT_CNPJS: ${{ github.event.inputs.cnpjs || '' }}
        run: python cvm_scraper.py

      - name: Upload Excel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: patrimonio_liquido_cvm
          path: patrimonio_liquido_cvm.xlsx

      - name: Commit and push Excel
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add patrimonio_liquido_cvm.xlsx
          git diff --cached --quiet || git commit -m "Atualizar planilha CVM [$(date -u '+%Y-%m-%d')]"
          git push
